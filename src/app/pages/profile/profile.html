<div class="profile-container">
  
  <div class="page-navigation">
    <a routerLink="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Retour au tableau de bord</a>
    <div class="page-tabs">
      <a routerLink="/profile" class="tab-link active">Mon Profil</a>
      <a routerLink="/settings" class="tab-link">Paramètres</a>
    </div>
  </div>

  <div class="layout-2-cols">
    <!-- Colonne de gauche : Avatar -->
    <div class="left-col">
      <div class="avatar-card">
        <div class="avatar-circle">
          <i class="fas fa-user"></i>
          <button class="camera-btn"><i class="fas fa-camera"></i></button>
        </div>
        <h2 class="avatar-title">Mon compte</h2>
        <div class="localization mt-16">
          <p class="text-sm">Localisation Sentinel Care :</p>
          <a href="#" class="link-sm">France</a>
        </div>
      </div>
    </div>

    <!-- Colonne de droite : Informations -->
    <div class="right-col">
      
      <!-- Section Informations du compte -->
      <div class="section-block">
        <div class="form-grid">
          <div class="form-group">
            <label>Prénom<span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" [(ngModel)]="user.firstname" />
            </div>
          </div>
          <div class="form-group">
            <label>Nom<span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-user input-icon"></i>
              <input type="text" [(ngModel)]="user.lastname" />
            </div>
          </div>
          <div class="form-group">
            <label>Spécialité<span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-stethoscope input-icon"></i>
              <input type="text" value="Dr" disabled />
            </div>
          </div>
          <div class="form-group">
            <label>Spécialité (Détail)<span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-stethoscope input-icon"></i>
              <input type="text" [(ngModel)]="user.specialty" />
            </div>
          </div>
          <div class="form-group">
            <label>Email<span class="required">*</span></label>
            <div class="input-wrapper">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" [(ngModel)]="user.email" disabled class="disabled-input" />
            </div>
          </div>
          <div class="form-group">
            <label>Numéro de téléphone</label>
            <div class="input-wrapper">
              <input type="text" [(ngModel)]="user.phone" />
            </div>
          </div>
          <div class="form-group">
            <label>Langue de préférence</label>
            <select class="custom-select" [(ngModel)]="user.language">
              <option value="Français">Français</option>
              <option value="Anglais">Anglais</option>
            </select>
          </div>
          <div class="form-group">
            <label>Pays</label>
            <select class="custom-select" [(ngModel)]="user.country">
              <option value="France">France</option>
              <option value="Belgique">Belgique</option>
              <option value="Suisse">Suisse</option>
            </select>
          </div>
        </div>

        <!-- Section Mot de passe (incluse dans la grille ou en dessous) -->
        <div class="form-grid mt-24">
          <div class="form-group">
            <label>Mot de passe</label>
            <div class="input-wrapper">
              <input type="password" value="*********" disabled class="disabled-input" />
            </div>
            <a href="#" class="forgot-link" (click)="$event.preventDefault(); forgotPassword()">Mot de passe oublié ?</a>
          </div>
          <div class="form-group" style="display: flex; align-items: flex-end;">
            <button class="btn-primary" (click)="changePassword()">Modifier le mot de passe</button>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Section Adresses -->
      <div class="section-block">
        <h3 class="section-title">Mes adresses</h3>
        
        <div class="address-grid mt-16">
          <div class="address-card" *ngFor="let addr of addresses">
            <div class="addr-content">
              <h4>{{ addr.label }}</h4>
              <p>{{ addr.details }}</p>
            </div>
            <div class="addr-actions">
              <button class="round-btn btn-edit" (click)="editAddress(addr)"><i class="fas fa-pen"></i></button>
              <button class="round-btn btn-delete" (click)="deleteAddress(addr)"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>

        <div class="action-row center mt-24">
          <button class="btn-primary" (click)="addAddress()">Ajouter une adresse</button>
        </div>
      </div>
      
      <!-- Global Actions -->
      <div class="global-actions mt-32">
        <button class="btn-primary btn-large" [disabled]="isSaving" (click)="saveChanges()">
          <span *ngIf="!isSaving">Enregistrer les modifications</span>
          <span *ngIf="isSaving"><i class="fas fa-spinner fa-spin"></i> Enregistrement...</span>
        </button>
      </div>

    </div>
  </div>
</div>
