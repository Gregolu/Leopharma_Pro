name: Update Mirror

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Push:
    if: ${{ github.repository == 'iRevolutionProto/Leopharma_Pro' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
        with:
          submodules: true
          ref: main
      - name: Push to private repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@github.com:Gregolu/Leopharma_Pro.git
          ssh_private_key:
            ${{ secrets.SSH_KEY }}